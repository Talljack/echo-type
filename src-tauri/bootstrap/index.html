<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EchoType</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #eef2ff;
        color: #312e81;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(79, 70, 229, 0.16), transparent 36%),
          linear-gradient(180deg, #f8faff 0%, #eef2ff 100%);
      }

      main {
        width: min(420px, calc(100vw - 32px));
        padding: 32px 28px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.82);
        border: 1px solid rgba(99, 102, 241, 0.18);
        box-shadow: 0 20px 60px rgba(79, 70, 229, 0.12);
        text-align: center;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 26px;
      }

      p {
        margin: 0;
        font-size: 14px;
        line-height: 1.6;
        color: rgba(49, 46, 129, 0.78);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>EchoType</h1>
      <p>Starting the local practice server…</p>
    </main>
  </body>
</html>

name: Release Desktop

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-desktop-${{ github.event.release.tag_name || github.ref_name }}
  cancel-in-progress: false

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Ensure GitHub Release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "$TAG" --generate-notes

  build:
    name: Build ${{ matrix.name }}
    needs: create-release
    if: always() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS
            bundles: app,dmg
          - os: ubuntu-22.04
            name: Linux
            bundles: deb
          - os: windows-latest
            name: Windows
            bundles: nsis

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf libfuse2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release version
        id: release_meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG_NAME="${{ github.event.release.tag_name }}"
          else
            TAG_NAME="${{ github.ref_name }}"
          fi

          VERSION="${TAG_NAME#v}"

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Sync app version
        run: node scripts/set-release-version.mjs "${{ steps.release_meta.outputs.tag_name }}"

      - name: Build frontend
        shell: bash
        run: bash scripts/build-tauri.sh

      - name: Build desktop bundles
        shell: bash
        env:
          NO_STRIP: true
          APPIMAGE_EXTRACT_AND_RUN: '1'
        run: pnpm tauri build --bundles ${{ matrix.bundles }} --config '{"build":{"beforeBuildCommand":""}}'

      - name: Package macOS app as zip
        if: runner.os == 'macOS'
        run: |
          APP_PATH="src-tauri/target/release/bundle/macos/EchoType.app"
          ZIP_PATH="src-tauri/target/release/bundle/macos/EchoType_${{ steps.release_meta.outputs.version }}_${RUNNER_ARCH}.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_PATH"

      - name: Upload macOS assets
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ steps.release_meta.outputs.tag_name }}"
          DMG_PATH="$(find src-tauri/target/release/bundle/dmg -maxdepth 1 -name '*.dmg' -print -quit)"
          ZIP_PATH="$(find src-tauri/target/release/bundle/macos -maxdepth 1 -name '*.zip' -print -quit)"
          gh release upload "$TAG" "$DMG_PATH" "$ZIP_PATH" --clobber

      - name: Upload Windows assets
        if: runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ steps.release_meta.outputs.tag_name }}"
          gh release upload "$TAG" \
            src-tauri/target/release/bundle/nsis/*.exe \
            --clobber

      - name: Upload Linux assets
        if: runner.os == 'Linux'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ steps.release_meta.outputs.tag_name }}"
          gh release upload "$TAG" \
            src-tauri/target/release/bundle/deb/*.deb \
            --clobber

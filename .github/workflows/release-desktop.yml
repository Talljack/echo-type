name: Release Desktop

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-desktop-${{ github.event.release.tag_name || github.ref_name }}
  cancel-in-progress: false

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Ensure GitHub Release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "$TAG" --generate-notes

  build:
    name: Build ${{ matrix.name }}
    needs: create-release
    if: always() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS
            bundles: app,dmg
          - os: ubuntu-22.04
            name: Linux
            bundles: deb,appimage
          - os: windows-latest
            name: Windows
            bundles: nsis

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf libfuse2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ runner.os == 'macOS' && 'aarch64-apple-darwin' || '' }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release version
        id: release_meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG_NAME="${{ github.event.release.tag_name }}"
          else
            TAG_NAME="${{ github.ref_name }}"
          fi

          VERSION="${TAG_NAME#v}"

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Sync app version
        if: startsWith(github.ref, 'refs/tags/v')
        run: node scripts/set-release-version.mjs "${{ steps.release_meta.outputs.tag_name }}"

      - name: Build frontend
        shell: bash
        run: bash scripts/build-tauri.sh

      - name: Setup AppImage library paths
        if: runner.os == 'Linux' && contains(matrix.bundles, 'appimage')
        run: |
          # sharp's native module links to libvips-cpp.so which is in @img/sharp-libvips-linux-x64
          # linuxdeploy needs LD_LIBRARY_PATH to find it for bundling into AppImage
          VIPS_DIR=$(find node_modules -path "*sharp-libvips-linux-x64/lib" -type d | head -1)
          if [ -n "$VIPS_DIR" ]; then
            VIPS_ABS=$(cd "$VIPS_DIR" && pwd)
            echo "Found sharp libvips at: $VIPS_ABS"
            ls -la "$VIPS_ABS"/libvips* || true
            echo "LD_LIBRARY_PATH=$VIPS_ABS${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> "$GITHUB_ENV"
          else
            echo "WARNING: sharp-libvips-linux-x64 not found in node_modules"
          fi

      - name: Import Apple certificate for pre-signing
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KC_PATH=$RUNNER_TEMP/signing.keychain-db
          KC_PASS=$(openssl rand -hex 12)
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERT_PATH
          security create-keychain -p "$KC_PASS" $KC_PATH
          security set-keychain-settings -lut 21600 $KC_PATH
          security unlock-keychain -p "$KC_PASS" $KC_PATH
          security import $CERT_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KC_PATH
          security set-key-partition-list -S apple-tool:,apple:,codesign: -k "$KC_PASS" $KC_PATH
          security list-keychain -d user -s $KC_PATH login.keychain-db
          echo "SIGNING_KEYCHAIN=$KC_PATH" >> "$GITHUB_ENV"

      - name: Sign native binaries in standalone resources
        if: runner.os == 'macOS'
        run: |
          # Apple notarization requires ALL binaries inside .app to be signed.
          # Tauri only signs the main binary, so we pre-sign native modules
          # (sharp .dylib/.node files) that get bundled into Resources.
          # NOTE: Do NOT pre-sign the Node.js binary with --options runtime here.
          # Hardened runtime without cs.allow-jit blocks V8 JIT and crashes Node.js.
          # Tauri's bundler will sign it appropriately during the bundle step.
          find src-tauri/resources/standalone -type f \( -name '*.dylib' -o -name '*.node' -o -name '*.so' \) | while read -r f; do
            echo "Signing: $f"
            codesign --force --sign "Developer ID Application: Yugang Cao (636LV693YD)" --options runtime --keychain "$SIGNING_KEYCHAIN" "$f"
          done

      - name: Build desktop bundles
        shell: bash
        env:
          NO_STRIP: true
          APPIMAGE_EXTRACT_AND_RUN: '1'
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: "Developer ID Application: Yugang Cao (636LV693YD)"
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          EXTRA_ARGS=""
          if [ "$RUNNER_OS" = "macOS" ]; then
            EXTRA_ARGS="--target aarch64-apple-darwin"
          fi
          pnpm tauri build --bundles ${{ matrix.bundles }} --verbose --config '{"build":{"beforeBuildCommand":""}}' $EXTRA_ARGS

      - name: Package macOS app as zip
        if: runner.os == 'macOS'
        run: |
          APP_PATH="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/EchoType.app"
          ZIP_PATH="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/EchoType_${{ steps.release_meta.outputs.version }}_aarch64.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_PATH"

      - name: Upload macOS assets
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ steps.release_meta.outputs.tag_name }}"
          DMG_PATH="$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -maxdepth 1 -name '*.dmg' -print -quit)"
          ZIP_PATH="$(find src-tauri/target/aarch64-apple-darwin/release/bundle/macos -maxdepth 1 -name '*.zip' -print -quit)"
          gh release upload "$TAG" "$DMG_PATH" "$ZIP_PATH" --clobber
          # Upload updater artifacts (.tar.gz and .sig files)
          find src-tauri/target/aarch64-apple-darwin/release/bundle/macos -maxdepth 1 \( -name '*.tar.gz' -o -name '*.tar.gz.sig' \) -exec gh release upload "$TAG" {} --clobber \;

      - name: Upload Windows assets
        if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ steps.release_meta.outputs.tag_name }}"
          gh release upload "$TAG" \
            src-tauri/target/release/bundle/nsis/*.exe \
            --clobber
          # Upload updater artifacts (.nsis.zip and .sig files)
          find src-tauri/target/release/bundle/nsis -maxdepth 1 \( -name '*.nsis.zip' -o -name '*.nsis.zip.sig' \) -exec gh release upload "$TAG" {} --clobber \;

      - name: Upload Linux assets
        if: runner.os == 'Linux' && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ steps.release_meta.outputs.tag_name }}"
          gh release upload "$TAG" \
            src-tauri/target/release/bundle/deb/*.deb \
            src-tauri/target/release/bundle/appimage/*.AppImage \
            --clobber
          # Upload updater artifacts (.tar.gz and .sig files)
          find src-tauri/target/release/bundle/appimage -maxdepth 1 \( -name '*.tar.gz' -o -name '*.tar.gz.sig' \) -exec gh release upload "$TAG" {} --clobber \;

  generate-latest-json:
    name: Generate latest.json
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate and upload latest.json
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/generate-latest-json.mjs "${{ github.ref_name }}"
